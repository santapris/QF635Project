# Backtest config: the Avellaneda-Stoikov adaptive market maker on the tiny
# synthetic OHLCV dataset. Fees and capital mirror the Binance Futures testnet
# the strategy was validated against (2 bps maker / 4 bps taker, $5,000 USDT).
#
# Run with:
#   python -m trading.runners.run_backtest --config configs/backtest_as.toml

[[instruments]]
symbol = "BTC-USDT"
exchange = "SIM"
asset_type = "SPOT"
base_currency = "BTC"
quote_currency = "USDT"
tick_size = "0.01"
lot_size = "0.0001"

[bus]
backend = "asyncio"
queue_size = 10000

[oms]
signal_ttl_seconds = 300.0

[position]
method = "WAVG"
mark_to_market_interval_seconds = 5.0

[[strategies]]
strategy_id = "as-1"
type = "avellaneda_stoikov"
instruments = ["SIM:BTC-USDT"]
[strategies.parameters]
gamma = "0.3"
k = "1.5"
tau_seconds = "300"
half_life_seconds = "60"
ofi_alpha = "0.0"
vpin_threshold = "0.7"
vpin_widen_factor = "3.0"
quote_size = "0.01"
max_position = "0.5"
min_vol = "0.5"
min_price_move_ticks = "1"

[[risk.global_rules]]
type = "instrument_allowlist"
[risk.global_rules.params]
allowed_instrument_ids = "SIM:BTC-USDT"

[[risk.per_strategy."as-1"]]
type = "max_position"
[risk.per_strategy."as-1".params]
max_long = "0.5"
max_short = "0.5"

[[risk.per_strategy."as-1"]]
type = "daily_loss_limit"
[risk.per_strategy."as-1".params]
max_loss = "2000"

[[order_gateways]]
venue = "SIM"
type = "backtest"
maker_bps = 2.0
taker_bps = 4.0
submit_ack_ms = 1.0
cancel_ack_ms = 1.0
fill_ms = 1.0
seed = 42

[backtest]
data_path = "configs/sample_data.csv"
instrument_id = "SIM:BTC-USDT"
snapshot_interval_seconds = 30.0
initial_equity = 5000.0
periods_per_year = 525600   # 1-minute bars in 24/7 markets
timestamp_unit = "ms"
